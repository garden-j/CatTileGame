name: Deploy Pygame Project to GitHub Pages

on:
  push:
    branches:
      - master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 깃허브 서버로 정원님의 소스코드를 가져옵니다.
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. 깨끗한 파이썬 환경을 세팅합니다.
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      # 3. pygbag을 서버에 직접 설치하고 순수 코드만 빌드합니다. (가상환경 자동 따돌림)
      - name: Install Pygbag and Build
        run: |
          python -m pip install --upgrade pip
          pip install pygbag
          # 정원님의 pure한 코드 위치(.)에서 사운드 에러를 우회하여 빌드합니다.
          pygbag --build --disable-sound-format-error .

      # 4. 빌드된 build/web 폴더 알맹이들을 gh-pages 브랜치로 자동 배포합니다.
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages