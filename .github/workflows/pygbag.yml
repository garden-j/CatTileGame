name: Deploy Pygame Project to GitHub Pages

on:
  push:
    branches:
      - master  # ⚠️ 정원님의 메인 브랜치가 master인 것이 이미지로 확인되었으니 master 유지하시면 됩니다!

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      # 🎯 깃허브 공식 pygbag 액션 주소로 올바르게 수정 완료!
      - name: Build Web Version via Pygbag
        uses: pygame-web/pygbag@main
        with:
          path: .
          args: --disable-sound-format-error

      # 🚀 빌드된 결과를 gh-pages 브랜치에 자동으로 업로드
      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages